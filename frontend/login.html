<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CloudHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: var(--glass-bg-light);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 60px 50px;
            width: 480px;
            text-align: center;
            box-shadow: var(--glass-shadow);
            color: white;
        }
        .login-card h2 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .login-card p {
            opacity: 0.85;
            margin-bottom: 45px;
            font-size: 1.1rem;
        }
        .role-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 25px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 25px;
            cursor: pointer;
            transition: var(--transition);
            color: white;
            font-family: var(--font-main);
            text-align: left;
            margin-bottom: 25px;
        }
        .role-btn:last-child {
            margin-bottom: 0;
        }
        .role-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .role-btn i {
            font-size: 2.8rem;
            width: 60px;
            text-align: center;
            color: white;
        }
        .btn-contents h3 {
            font-size: 1.35rem;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .btn-contents p {
            font-size: 0.95rem;
            margin-bottom: 0;
            opacity: 0.8;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
        }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: var(--font-main);
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: var(--transition);
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .input-group input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-options a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: var(--transition);
        }
        .form-options a:hover {
            opacity: 1;
            text-decoration: underline;
        }
        .submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-family: var(--font-main);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 15px;
        }
        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .back-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-family: var(--font-main);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card" id="role-selection">
            <i class="fa-solid fa-cloud" style="font-size: 3.5rem; margin-bottom: 20px;"></i>
            <h2>Sign In to CloudHub</h2>
            <p>Select your account configuration role to continue testing</p>
            
            <button type="button" class="role-btn" onclick="showLoginForm('admin')">
                <i class="fa-solid fa-user-shield"></i>
                <div class="btn-contents">
                    <h3>Administrator</h3>
                    <p>Full suite access, file control, and user management capabilities.</p>
                </div>
            </button>
            
            <button type="button" class="role-btn" onclick="showLoginForm('user')">
                <i class="fa-solid fa-user"></i>
                <div class="btn-contents">
                    <h3>Regular User</h3>
                    <p>Standard view-only mode. Access restricted features safely.</p>
                </div>
            </button>
        </div>
        
        <div class="login-card" id="credentials-form" style="display: none;">
            <i class="fa-solid fa-user-lock" style="font-size: 3.5rem; margin-bottom: 20px;"></i>
            <h2 id="form-title">Admin Login</h2>
            <p>Enter your secure credentials to authenticate</p>
            
            <form onsubmit="handleAuth(event)">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" onclick="alert('A password reset link has been dispatched to your email address!')">Forgot Password?</a>
                </div>
                
                <button type="submit" class="submit-btn"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
                <button type="button" class="back-btn" onclick="goBack()">Back to Roles</button>
            </form>
        </div>
    </div>
    
    <script>
        let selectedRole = '';
        
        function showLoginForm(role) {
            selectedRole = role;
            document.getElementById('role-selection').style.display = 'none';
            document.getElementById('credentials-form').style.display = 'block';
            
            if (role === 'admin') {
                document.getElementById('form-title').innerText = 'Administrator Login';
            } else {
                document.getElementById('form-title').innerText = 'User Login';
            }
            
            // Ensure inputs are completely natively empty for your presentation!
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }
        
        function goBack() {
            document.getElementById('credentials-form').style.display = 'none';
            document.getElementById('role-selection').style.display = 'block';
            document.getElementById('password').value = '';
        }

        function handleAuth(event) {
            event.preventDefault();
            // Simulating real DBMS auth delay for presentation effect
            const btn = document.querySelector('.submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            
            setTimeout(() => {
                localStorage.setItem('cloudhub_role', selectedRole);
                window.location.href = 'index.html?role=' + selectedRole;
            }, 800);
        }
    </script>
</body>
</html>
