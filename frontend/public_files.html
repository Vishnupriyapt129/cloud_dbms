<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudHub | Public Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .public-container {
            width: 100%;
            max-width: 1200px;
            margin-top: 50px;
            padding: 30px;
            z-index: 10;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .home-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            transition: var(--transition);
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateX(-5px);
        }

        h1 {
            font-size: 3rem;
            color: white;
            text-align: center;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -1.5px;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 60px;
            font-size: 1.1rem;
        }

        .public-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .file-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .file-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            background: radial-gradient(circle at top right, var(--primary-glow), transparent 70%);
            opacity: 0.1;
        }

        .file-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(139, 92, 246, 0.1);
            background: var(--bg-hover);
        }

        .file-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.05));
        }

        .file-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            word-break: break-all;
            margin-bottom: 5px;
            min-height: 40px;
        }

        .file-owner-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.15);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            width: fit-content;
        }

        .file-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .view-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 700;
            transition: var(--transition);
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px var(--primary-glow);
        }

        .view-btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 12px 30px var(--primary-glow);
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .empty-state i {
             font-size: 6rem;
             margin-bottom: 30px;
             color: var(--border);
        }

        .glow-sphere {
            position: absolute;
            width: 800px; height: 800px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.3;
            top: -300px; left: -300px;
        }
    </style>
</head>
<body>
    <div class="glow-sphere"></div>
    <div class="public-container">
        <div class="header-actions">
            <a href="home.html" class="home-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
        
        <h1>Public Discovery</h1>
        <p class="subtitle">Securely shared files globally by the CloudHub community.</p>

        <div class="public-grid" id="public-files-grid">
            <div class="empty-state">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <h3 style="color: white; margin-top: 20px;">Scanning the Vault...</h3>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = (window.location.protocol === 'file:' || window.location.origin === 'null') ? 'http://localhost:5000/api' : window.location.origin + '/api';

        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('public-files-grid');
            
            try {
                const response = await fetch(`${API_BASE}/files/public`);
                const data = await response.json();

                if (data.status === 'success') {
                    if (data.data.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-state">
                                <i class="fa-solid fa-folder-open"></i>
                                <h3 style="color: white;">The Community Hub is Quiet</h3>
                                <p>No files have been made public yet. Check back soon!</p>
                            </div>
                        `;
                        return;
                    }

                    grid.innerHTML = '';
                    data.data.forEach(f => {
                        const iconHtml = getIconHtml(f.icon);
                        const card = document.createElement('div');
                        card.className = 'file-card';
                        card.innerHTML = `
                            <div class="file-icon">${iconHtml}</div>
                            <div class="file-owner-pill"><i class="fa-solid fa-user-shield"></i> ${f.owner_name}</div>
                            <div class="file-name">${f.name}</div>
                            <div class="file-meta-row">
                                <span><i class="fa-solid fa-hard-drive"></i> ${f.size}</span>
                                <span>${f.date_modified}</span>
                            </div>
                            <a href="${API_BASE}/files/download/${f.id}?uid=1" target="_blank" class="view-btn">
                                <i class="fa-solid fa-cloud-arrow-down"></i> Open File
                            </a>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (err) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-triangle-exclamation" style="color: var(--accent);"></i>
                        <h3 style="color: white;">System Offline</h3>
                        <p>We are currently unable to reach the file servers.</p>
                    </div>
                `;
            }
        });

        function getIconHtml(iconType) {
            const icons = {
                'pdf': '<i class="fa-solid fa-file-pdf" style="color:#e74c3c;"></i>',
                'excel': '<i class="fa-solid fa-file-excel" style="color:#2ecc71;"></i>',
                'powerpoint': '<i class="fa-solid fa-file-powerpoint" style="color:#e67e22;"></i>',
                'image': '<i class="fa-solid fa-file-image" style="color:#3498db;"></i>',
                'text': '<i class="fa-solid fa-file-lines" style="color:#bdc3c7;"></i>',
                'music': '<i class="fa-solid fa-file-audio" style="color:#9b59b6;"></i>',
                'video': '<i class="fa-solid fa-file-video" style="color:#e84393;"></i>'
            };
            const i = icons[iconType] || '<i class="fa-solid fa-file" style="color:#95a5a6;"></i>';
            return i;
        }
    </script>
</body>
</html>
